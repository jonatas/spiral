<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1"/>
        <title>Spiral Vortex Monitor</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&family=Open+Sans:wght@400;500&family=JetBrains+Mono&display=swap" rel="stylesheet">
        <style>
            :root {
                --primary-color: #5c9eff;
                --secondary-color: #b158fc;
                --accent-color: #ff5a9d;
                --bg-color: #0f1117;
                --card-bg-color: #161b27;
                --text-color: #ccd6f6;
                --gray-color: #8892b0;
                --border-color: rgba(255, 255, 255, 0.07);
                --transition-speed: 0.3s;
            }

            body {
                background-color: var(--bg-color);
                color: var(--text-color);
                margin: 0;
                font-family: 'Open Sans', sans-serif;
                overflow: hidden;
                line-height: 1.6;
            }

            #canvas-container {
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
                width: 100vw;
            }

            canvas {
                max-width: 90vmin;
                max-height: 90vmin;
            }

            .overlay {
                position: absolute;
                top: 30px;
                left: 30px;
                background: rgba(22, 27, 39, 0.85);
                backdrop-filter: blur(12px);
                padding: 1.75rem;
                border-radius: 16px;
                border: 1px solid var(--border-color);
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
                min-width: 280px;
                pointer-events: auto;
            }

            h1 {
                font-family: 'Poppins', sans-serif;
                font-weight: 600;
                font-size: 1.25rem;
                margin: 0 0 1rem 0;
                color: #ffffff;
                letter-spacing: 0.5px;
                text-transform: uppercase;
            }

            .stats-container {
                display: flex;
                flex-direction: column;
                gap: 12px;
            }

            .stat-item {
                display: flex;
                justify-content: space-between;
                align-items: center;
                font-size: 0.85rem;
                font-family: 'JetBrains Mono', monospace;
            }

            .stat-label {
                color: var(--gray-color);
            }

            .stat-value {
                color: var(--primary-color);
                font-weight: 500;
            }

            .ticker {
                margin-top: 1.5rem;
                padding-top: 1rem;
                border-top: 1px solid var(--border-color);
                font-size: 0.75rem;
                font-family: 'JetBrains Mono', monospace;
                color: #4ade80;
                min-height: 1.2rem;
            }

            .badge {
                display: inline-block;
                padding: 2px 8px;
                border-radius: 4px;
                font-size: 0.65rem;
                font-weight: 600;
                margin-right: 8px;
                background: rgba(92, 158, 255, 0.1);
                color: var(--primary-color);
                border: 1px solid rgba(92, 158, 255, 0.2);
            }

            .heatmap-container {
                margin-top: 2rem;
                display: grid;
                grid-template-columns: repeat(20, 1fr);
                gap: 4px;
                max-width: 100%;
            }

            .page-block {
                aspect-ratio: 1;
                background: rgba(255, 255, 255, 0.03);
                border: 1px solid rgba(255, 255, 255, 0.05);
                border-radius: 2px;
                cursor: pointer;
                transition: all 0.2s;
            }

            .page-block:hover {
                background: var(--primary-color);
                box-shadow: 0 0 10px var(--primary-color);
                transform: scale(1.1);
                z-index: 10;
            }

            .page-block.active {
                background: var(--accent-color);
                box-shadow: 0 0 15px var(--accent-color);
                animation: pulse 1s infinite;
            }

            @keyframes pulse {
                0% { opacity: 1; }
                50% { opacity: 0.5; }
                100% { opacity: 1; }
            }

            .inspector {
                margin-top: 1.5rem;
                padding: 1rem;
                background: rgba(0, 0, 0, 0.2);
                border-radius: 8px;
                border-left: 3px solid var(--accent-color);
                font-family: 'JetBrains Mono', monospace;
                font-size: 0.7rem;
                color: var(--text-color);
            }

            .inspector-title {
                color: var(--accent-color);
                font-weight: bold;
                margin-bottom: 0.5rem;
                text-transform: uppercase;
            }

            .dashboard {
                margin-top: 1.5rem;
                padding: 1rem;
                background: rgba(255, 255, 255, 0.05);
                border-radius: 8px;
                border: 1px solid rgba(255, 255, 255, 0.1);
            }

            .stats-grid {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 10px;
                margin-top: 10px;
            }

            .stat-mini {
                text-align: center;
            }

            .stat-mini .stat-label {
                font-size: 0.5rem;
                color: rgba(255, 255, 255, 0.5);
                margin-bottom: 2px;
            }

            .stat-mini .stat-value {
                font-family: 'JetBrains Mono', monospace;
                font-size: 0.8rem;
                font-weight: bold;
            }

            .projection {
                margin-top: 15px;
                padding-top: 10px;
                border-top: 1px dashed rgba(255, 255, 255, 0.1);
            }

            .projection .stat-label {
                font-size: 0.55rem;
                color: var(--primary-color);
                font-weight: bold;
                letter-spacing: 1px;
            }
        </style>
    </head>
    <body>
    </body>
</html>
