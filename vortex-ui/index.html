<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1"/>
        <title>Vortex — Spiral Monitor</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
        <style>
            :root {
                --bg:      #0d1117;
                --bg-panel:#161b22;
                --bg-hover:#21262d;
                --border:  #30363d;
                --text:    #e6edf3;
                --muted:   #7d8590;
                --blue:    #58a6ff;
                --green:   #3fb950;
                --red:     #f85149;
                --yellow:  #d29922;
                --purple:  #bc8cff;
                --orange:  #ffa657;
            }

            *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

            body {
                background: var(--bg);
                color: var(--text);
                font-family: 'JetBrains Mono', monospace;
                font-size: 12px;
                height: 100vh;
                overflow: hidden;
            }

            #app {
                display: flex;
                flex-direction: column;
                height: 100vh;
            }

            /* ─── TOP BAR ─────────────────────────────── */
            .topbar {
                display: flex;
                align-items: center;
                gap: 6px;
                padding: 0 14px;
                height: 38px;
                min-height: 38px;
                border-bottom: 1px solid var(--border);
                background: var(--bg-panel);
                flex-shrink: 0;
            }

            .brand {
                font-weight: 700;
                font-size: 13px;
                letter-spacing: 3px;
                color: var(--text);
                margin-right: 10px;
                white-space: nowrap;
            }

            .tab-row {
                display: flex;
                gap: 4px;
            }

            .tab {
                background: transparent;
                border: 1px solid transparent;
                color: var(--muted);
                padding: 2px 10px;
                border-radius: 4px;
                font-family: 'JetBrains Mono', monospace;
                font-size: 11px;
                cursor: pointer;
                transition: color 0.15s;
                white-space: nowrap;
            }
            .tab:hover { color: var(--text); }
            .tab-active {
                background: rgba(88,166,255,0.15);
                border-color: rgba(88,166,255,0.4);
                color: var(--blue);
                font-weight: 700;
            }

            .no-tables { color: var(--muted); font-size: 11px; }
            .topbar-spacer { flex: 1; }

            .topbar-stats {
                display: flex;
                gap: 0;
            }
            .ts-item {
                display: flex;
                align-items: center;
                gap: 5px;
                padding: 0 10px;
                border-left: 1px solid var(--border);
            }
            .ts-label { color: var(--muted); font-size: 10px; }
            .ts-value { color: var(--text); font-weight: 700; font-size: 13px; }
            .ts-green { color: var(--green); }

            .conn-dot {
                padding: 2px 9px;
                border-radius: 10px;
                font-size: 10px;
                font-weight: 700;
                margin-left: 6px;
                white-space: nowrap;
            }
            .conn-live { background: rgba(63,185,80,0.12); color: var(--green); }
            .conn-dead { background: rgba(248,81,73,0.12); color: var(--red); }

            /* ─── MAIN GRID ───────────────────────────── */
            .main-grid {
                display: grid;
                grid-template-columns: 220px 1fr 190px;
                height: calc(100vh - 38px);
                overflow: hidden;
            }

            .left-panel {
                border-right: 1px solid var(--border);
                background: var(--bg-panel);
                overflow-y: auto;
                padding: 10px;
                display: flex;
                flex-direction: column;
                gap: 0;
            }

            .right-panel {
                border-left: 1px solid var(--border);
                background: var(--bg-panel);
                overflow-y: auto;
                padding: 10px;
            }

            .center-panel {
                padding: 10px 12px;
                overflow-y: auto;
                display: flex;
                flex-direction: column;
                gap: 8px;
            }

            /* ─── PANEL BLOCKS ────────────────────────── */
            .panel-block {
                margin-bottom: 14px;
            }
            .panel-hdr {
                font-size: 10px;
                font-weight: 700;
                color: var(--muted);
                letter-spacing: 1.5px;
                padding-bottom: 6px;
                border-bottom: 1px solid var(--border);
                margin-bottom: 8px;
            }

            /* ─── HIERARCHY TREE ──────────────────────── */
            .tree { display: flex; flex-direction: column; gap: 1px; }

            .tree-node {
                display: flex;
                align-items: baseline;
                gap: 5px;
                padding: 2px 0;
                font-size: 11px;
                min-height: 20px;
            }
            .tree-node-active { background: rgba(88,166,255,0.08); border-radius: 3px; }
            .tree-node-active .node-tier { color: var(--blue) !important; }
            .node-glyph { color: var(--muted); flex-shrink: 0; width: 10px; }
            .node-tier {
                font-weight: 700;
                font-size: 10px;
                min-width: 28px;
                flex-shrink: 0;
            }
            .node-raw  { color: var(--blue); }
            .node-agg  { color: var(--purple); }
            .node-name {
                color: var(--muted);
                font-size: 9px;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
                min-width: 0;
            }

            .source-row {
                display: flex;
                align-items: baseline;
                flex-wrap: wrap;
                gap: 3px;
                padding: 2px 0;
                font-size: 10px;
                color: var(--muted);
                line-height: 1.4;
            }
            .src-col     { color: var(--orange); }
            .src-arrow   { color: var(--muted); }
            .src-formula { color: var(--purple); }
            .src-mat     { color: var(--muted); font-size: 9px; opacity: 0.7; }

            .tree-footer {
                display: flex;
                justify-content: space-between;
                align-items: baseline;
                padding: 3px 0;
                border-top: 1px solid var(--border);
                margin-top: 4px;
                font-size: 10px;
                gap: 4px;
            }
            .tf-label { color: var(--muted); flex-shrink: 0; }
            .tf-value { color: var(--text); text-align: right; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
            .tf-ts { font-size: 9px; color: var(--muted); }

            .empty-state {
                color: var(--muted);
                font-size: 11px;
                padding: 20px 8px;
                text-align: center;
                line-height: 1.6;
            }

            /* ─── COMPRESSION PANEL ───────────────────── */
            .cmp-panel { display: flex; flex-direction: column; gap: 3px; }

            .live-stats {
                margin-bottom: 8px;
                padding-bottom: 8px;
                border-bottom: 1px solid var(--border);
            }
            .ls-row {
                display: flex;
                justify-content: space-between;
                padding: 2px 0;
                font-size: 11px;
            }
            .ls-label { color: var(--muted); }
            .ls-value { color: var(--text); font-weight: 500; }
            .ls-dim   { color: var(--muted); }
            .ls-green { color: var(--green); font-weight: 700; }

            .cmp-section-label {
                font-size: 9px;
                font-weight: 700;
                color: var(--muted);
                letter-spacing: 1px;
                margin-bottom: 4px;
            }

            .cmp-bar-row {
                display: flex;
                align-items: center;
                gap: 5px;
                margin-bottom: 3px;
                font-size: 10px;
            }
            .cmp-lbl   { width: 38px; color: var(--muted); flex-shrink: 0; }
            .cmp-outer {
                flex: 1;
                height: 5px;
                background: rgba(255,255,255,0.06);
                border-radius: 2px;
                overflow: hidden;
            }
            .cmp-inner { height: 100%; border-radius: 2px; transition: width 0.4s ease; }
            .cmp-heap   { background: var(--red); }
            .cmp-spiral { background: var(--green); }
            .cmp-xor    { background: var(--purple); }
            .cmp-val   { width: 40px; text-align: right; color: var(--text); font-size: 10px; white-space: nowrap; flex-shrink: 0; }

            .three-grid {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 4px;
                margin-top: 4px;
            }
            .tg-cell { text-align: center; padding: 4px 2px; }
            .tg-label {
                display: block;
                font-size: 9px;
                color: var(--muted);
                margin-bottom: 2px;
                letter-spacing: 0.5px;
            }
            .tg-value { display: block; font-size: 12px; font-weight: 700; }
            .tg-red  { color: var(--red); }
            .tg-green{ color: var(--green); }
            .tg-blue { color: var(--blue); }

            .slider-row {
                display: flex;
                align-items: center;
                gap: 8px;
                margin: 5px 0;
            }
            .slider-row input[type=range] {
                flex: 1;
                accent-color: var(--blue);
                cursor: pointer;
                height: 3px;
            }
            .slider-label {
                font-size: 10px;
                color: var(--blue);
                min-width: 60px;
                text-align: right;
                white-space: nowrap;
            }

            /* ─── CENTER: PAGE MAP ────────────────────── */
            .center-hdr {
                display: flex;
                align-items: center;
                gap: 10px;
                padding-bottom: 6px;
                border-bottom: 1px solid var(--border);
                margin-bottom: 4px;
            }
            .page-meta {
                color: var(--muted);
                font-size: 10px;
            }

            .page-map {
                display: flex;
                flex-wrap: wrap;
                gap: 2px;
                align-content: flex-start;
            }

            .page-cell {
                width: 14px;
                height: 14px;
                border-radius: 2px;
                cursor: pointer;
                opacity: 0.72;
                transition: transform 0.1s, opacity 0.1s;
                flex-shrink: 0;
            }
            .page-cell:hover {
                transform: scale(1.4);
                opacity: 1;
                position: relative;
                z-index: 10;
            }
            .page-cell.selected {
                opacity: 1;
                transform: scale(1.15);
                outline: 1.5px solid var(--text);
                outline-offset: 1px;
                position: relative;
                z-index: 5;
            }

            .ticker {
                margin-top: auto;
                padding-top: 8px;
                border-top: 1px solid var(--border);
                font-size: 10px;
                color: var(--green);
                min-height: 22px;
            }

            /* ─── BLOCK INSPECTOR ─────────────────────── */
            .block-inspector { display: flex; flex-direction: column; gap: 1px; }

            .bi-title {
                font-size: 12px;
                font-weight: 700;
                color: var(--text);
                margin-bottom: 8px;
                padding-bottom: 6px;
                border-bottom: 1px solid var(--border);
                display: flex;
                align-items: center;
                gap: 6px;
            }

            .badge-boundary {
                font-size: 9px;
                font-weight: 700;
                padding: 1px 5px;
                border-radius: 2px;
                background: rgba(188,140,255,0.15);
                color: var(--purple);
                border: 1px solid rgba(188,140,255,0.3);
            }

            .irow {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 3px 0;
                border-bottom: 1px solid rgba(255,255,255,0.03);
                font-size: 11px;
            }
            .irow-full {
                padding: 3px 0;
                border-bottom: 1px solid rgba(255,255,255,0.03);
                font-size: 11px;
            }
            .ilabel { color: var(--muted); flex-shrink: 0; }
            .ivalue { color: var(--text); font-weight: 500; }
            .ivalue-sm { font-size: 10px; }
            .ivalue-ts { color: var(--muted); font-size: 9px; margin-top: 1px; word-break: break-all; }
            .ivalue.good { color: var(--green); }
            .ivalue.warn { color: var(--yellow); }
            .ivalue.bad  { color: var(--red); }

            /* scrollbar */
            ::-webkit-scrollbar { width: 4px; height: 4px; }
            ::-webkit-scrollbar-track { background: transparent; }
            ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
            ::-webkit-scrollbar-thumb:hover { background: var(--muted); }
        </style>
    </head>
    <body>
    </body>
</html>
