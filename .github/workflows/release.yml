name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        pg_version: [18]
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential libreadline-dev zlib1g-dev flex bison \
            libxml2-dev libxslt-dev libssl-dev libxml2-utils xsltproc \
            ccache pkg-config libclang-dev clang libicu-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          # Try to install postgresql@18
          brew install postgresql@18 || echo "postgresql@18 not found in brew core, continuing..."
          if [ -d "/opt/homebrew/opt/postgresql@18/bin" ]; then
            echo "/opt/homebrew/opt/postgresql@18/bin" >> $GITHUB_PATH
          fi
          brew install icu4c || true

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-

      - name: Install cargo-pgrx
        run: cargo install cargo-pgrx --version 0.17.0 --locked

      - name: Initialize pgrx
        run: |
          if command -v pg_config > /dev/null; then
            PG_CONFIG=$(command -v pg_config)
            PG_VER=$($PG_CONFIG --version | awk '{print $2}' | cut -d. -f1)
            if [ "$PG_VER" = "18" ]; then
              echo "Using existing pg_config for PG18: $PG_CONFIG"
              cargo pgrx init --pg18=$PG_CONFIG
            else
              echo "Existing pg_config is for PG$PG_VER, downloading PG18..."
              cargo pgrx init --pg18=download
            fi
          else
            echo "No pg_config found, downloading PG18..."
            cargo pgrx init --pg18=download
          fi

      - name: Build Package
        run: cargo pgrx package --features pg${{ matrix.pg_version }}

      - name: Create Tarball
        run: |
          PACKAGE_NAME="spiral"
          TAG_NAME="${{ github.ref_name }}"
          # Clean tag name for filename (e.g. v0.1.0 -> 0.1.0)
          VERSION="${TAG_NAME#v}"
          TARGET_DIR="target/release/${PACKAGE_NAME}-pg${{ matrix.pg_version }}"
          # Use lower case for OS and ARCH to match common conventions
          OS=$(echo "${{ runner.os }}" | tr '[:upper:]' '[:lower:]')
          ARCH=$(echo "${{ runner.arch }}" | tr '[:upper:]' '[:lower:]')
          OUTPUT_NAME="${PACKAGE_NAME}-${VERSION}-${OS}-${ARCH}-pg${{ matrix.pg_version }}.tar.gz"
          tar -czf "${OUTPUT_NAME}" -C "${TARGET_DIR}" .
          echo "ASSET_PATH=${OUTPUT_NAME}" >> $GITHUB_ENV

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: assets-${{ runner.os }}-${{ runner.arch }}
          path: ${{ env.ASSET_PATH }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*.tar.gz
          generate_release_notes: true
          draft: false
          prerelease: false

  homebrew:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Update Homebrew Formula
        run: |
          TAG_NAME="${{ github.ref_name }}"
          VERSION="${TAG_NAME#v}"
          URL="https://github.com/${{ github.repository }}/archive/refs/tags/${TAG_NAME}.tar.gz"
          
          # Find the linux asset to calculate SHA256 for the formula (usually from source)
          # Homebrew usually builds from source, but we can use the source tarball's SHA256.
          # The script will download the source tarball if we don't provide the SHA256.
          ./scripts/update-homebrew.sh "${VERSION}" "${URL}"

      - name: Commit formula update
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/spiral.rb
          git commit -m "chore: update homebrew formula to ${{ github.ref_name }}" || echo "No changes to commit"
          git push origin main
