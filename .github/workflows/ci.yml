name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      extension: ${{ steps.filter.outputs.extension }}
      vortex_server: ${{ steps.filter.outputs.vortex_server }}
      vortex_ui: ${{ steps.filter.outputs.vortex_ui }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            extension:
              - '.github/workflows/ci.yml'
              - 'Cargo.toml'
              - 'spiral.control'
              - 'src/**'
              - 'sql/**'
              - 'tests/**'
            vortex_server:
              - '.github/workflows/ci.yml'
              - 'vortex-server/**'
            vortex_ui:
              - '.github/workflows/ci.yml'
              - 'vortex-ui/**'

  lint:
    name: Lint
    needs: changes
    if: needs.changes.outputs.extension == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libreadline-dev \
            zlib1g-dev \
            flex \
            bison \
            libxml2-dev \
            libxslt-dev \
            libssl-dev \
            libxml2-utils \
            xsltproc \
            ccache \
            pkg-config \
            libclang-dev \
            clang
      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ runner.os }}-ccache
          restore-keys: |
            ${{ runner.os }}-ccache
      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          prefix-key: "v1-rust"
          shared-key: "spiral"
      - name: Cache cargo-pgrx binary
        id: cache-pgrx-bin
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/cargo-pgrx
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
          key: ${{ runner.os }}-cargo-pgrx-bin-0.17.0
      - name: Install cargo-pgrx
        if: steps.cache-pgrx-bin.outputs.cache-hit != 'true'
        run: cargo install cargo-pgrx --version 0.17.0 --locked
      - name: Cache pgrx PG installation
        id: cache-pgrx-pg
        uses: actions/cache@v4
        with:
          path: ~/.pgrx
          key: ${{ runner.os }}-pgrx-0.17.0-pg18-v1
      - name: Initialize pgrx
        if: steps.cache-pgrx-pg.outputs.cache-hit != 'true'
        run: cargo pgrx init --pg18 download
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Run clippy
        run: |
          export PATH="/usr/lib/ccache:$PATH"
          cargo clippy --all-targets --features pg18 -- -D warnings

  test:
    name: Test (PG ${{ matrix.pg_version }})
    needs: changes
    if: needs.changes.outputs.extension == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        pg_version: [18]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libreadline-dev \
            zlib1g-dev \
            flex \
            bison \
            libxml2-dev \
            libxslt-dev \
            libssl-dev \
            libxml2-utils \
            xsltproc \
            ccache \
            pkg-config \
            libclang-dev \
            clang

      - uses: dtolnay/rust-toolchain@stable

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ runner.os }}-ccache
          restore-keys: |
            ${{ runner.os }}-ccache

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          prefix-key: "v1-rust"
          shared-key: "spiral"

      - name: Cache cargo-pgrx binary
        id: cache-pgrx-bin
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/cargo-pgrx
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
          key: ${{ runner.os }}-cargo-pgrx-bin-0.17.0

      - name: Install cargo-pgrx
        if: steps.cache-pgrx-bin.outputs.cache-hit != 'true'
        run: cargo install cargo-pgrx --version 0.17.0 --locked

      - name: Cache pgrx PG installation
        id: cache-pgrx-pg
        uses: actions/cache@v4
        with:
          path: ~/.pgrx
          key: ${{ runner.os }}-pgrx-0.17.0-pg18-v1

      - name: Initialize pgrx
        if: steps.cache-pgrx-pg.outputs.cache-hit != 'true'
        run: cargo pgrx init --pg18 download

      - name: Run tests
        run: |
          export PATH="/usr/lib/ccache:$PATH"
          cargo pgrx test pg${{ matrix.pg_version }} --no-default-features --features pg${{ matrix.pg_version }}

  vortex-server-build:
    name: Build Vortex Server
    needs: changes
    if: needs.changes.outputs.vortex_server == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          prefix-key: "v1-rust"
          shared-key: "spiral-vortex-server"
          workspaces: |
            vortex-server
      - name: Build vortex-server
        working-directory: vortex-server
        run: cargo check

  vortex-ui-build:
    name: Build Vortex UI
    needs: changes
    if: needs.changes.outputs.vortex_ui == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          prefix-key: "v1-rust"
          shared-key: "spiral-vortex-ui"
          workspaces: |
            vortex-ui
      - name: Build vortex-ui
        working-directory: vortex-ui
        run: cargo check --target wasm32-unknown-unknown
