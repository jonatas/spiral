name: CI

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libreadline-dev \
            zlib1g-dev \
            flex \
            bison \
            libxml2-dev \
            libxslt-dev \
            libssl-dev \
            libxml2-utils \
            xsltproc \
            ccache \
            pkg-config \
            libclang-dev \
            clang
      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ runner.os }}-ccache
          restore-keys: |
            ${{ runner.os }}-ccache
      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          prefix-key: "v1-rust"
          shared-key: "spiral"
      - name: Cache cargo-pgrx binary
        id: cache-pgrx-bin
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/cargo-pgrx
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
          key: ${{ runner.os }}-cargo-pgrx-bin-0.17.0
      - name: Install cargo-pgrx
        if: steps.cache-pgrx-bin.outputs.cache-hit != 'true'
        run: cargo install cargo-pgrx --version 0.17.0 --locked
      - name: Cache pgrx PG installation
        id: cache-pgrx-pg
        uses: actions/cache@v4
        with:
          path: ~/.pgrx
          key: ${{ runner.os }}-pgrx-0.17.0-pg18-v1
      - name: Initialize pgrx
        if: steps.cache-pgrx-pg.outputs.cache-hit != 'true'
        run: cargo pgrx init --pg18 download
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Run clippy
        run: |
          export PATH="/usr/lib/ccache:$PATH"
          cargo clippy --all-targets --features pg18 -- -D warnings

  test:
    name: Test (PG ${{ matrix.pg_version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        pg_version: [18]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libreadline-dev \
            zlib1g-dev \
            flex \
            bison \
            libxml2-dev \
            libxslt-dev \
            libssl-dev \
            libxml2-utils \
            xsltproc \
            ccache \
            pkg-config \
            libclang-dev \
            clang

      - uses: dtolnay/rust-toolchain@stable

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ runner.os }}-ccache
          restore-keys: |
            ${{ runner.os }}-ccache

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          prefix-key: "v1-rust"
          shared-key: "spiral"

      - name: Cache cargo-pgrx binary
        id: cache-pgrx-bin
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/cargo-pgrx
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
          key: ${{ runner.os }}-cargo-pgrx-bin-0.17.0

      - name: Install cargo-pgrx
        if: steps.cache-pgrx-bin.outputs.cache-hit != 'true'
        run: cargo install cargo-pgrx --version 0.17.0 --locked

      - name: Cache pgrx PG installation
        id: cache-pgrx-pg
        uses: actions/cache@v4
        with:
          path: ~/.pgrx
          key: ${{ runner.os }}-pgrx-0.17.0-pg18-v1

      - name: Initialize pgrx
        if: steps.cache-pgrx-pg.outputs.cache-hit != 'true'
        run: cargo pgrx init --pg18 download

      - name: Run tests
        run: |
          export PATH="/usr/lib/ccache:$PATH"
          cargo pgrx test pg${{ matrix.pg_version }} --no-default-features --features pg${{ matrix.pg_version }}

  vortex-server-build:
    name: Build Vortex Server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          prefix-key: "v1-rust"
          shared-key: "spiral-vortex-server"
          workspaces: |
            vortex-server
      - name: Build vortex-server
        working-directory: vortex-server
        run: cargo check

  vortex-ui-build:
    name: Build Vortex UI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          prefix-key: "v1-rust"
          shared-key: "spiral-vortex-ui"
          workspaces: |
            vortex-ui
      - name: Build vortex-ui
        working-directory: vortex-ui
        run: cargo check --target wasm32-unknown-unknown

  build-release:
    name: Build Release (${{ matrix.os }})
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - lint
      - test
      - vortex-server-build
      - vortex-ui-build
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        pg_version: [18]
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential libreadline-dev zlib1g-dev flex bison \
            libxml2-dev libxslt-dev libssl-dev libxml2-utils xsltproc \
            ccache pkg-config libclang-dev clang libicu-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install postgresql@18 || echo "postgresql@18 not found in brew core, continuing..."
          if [ -d "/opt/homebrew/opt/postgresql@18/bin" ]; then
            echo "/opt/homebrew/opt/postgresql@18/bin" >> $GITHUB_PATH
          fi
          brew install icu4c || true

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-

      - name: Install cargo-pgrx
        run: cargo install cargo-pgrx --version 0.17.0 --locked

      - name: Initialize pgrx
        run: |
          if command -v pg_config > /dev/null; then
            PG_CONFIG=$(command -v pg_config)
            PG_VER=$($PG_CONFIG --version | awk '{print $2}' | cut -d. -f1)
            if [ "$PG_VER" = "18" ]; then
              echo "Using existing pg_config for PG18: $PG_CONFIG"
              cargo pgrx init --pg18=$PG_CONFIG
            else
              echo "Existing pg_config is for PG$PG_VER, downloading PG18..."
              cargo pgrx init --pg18=download
            fi
          else
            echo "No pg_config found, downloading PG18..."
            cargo pgrx init --pg18=download
          fi

      - name: Build Package
        run: |
          if command -v pg_config > /dev/null; then
            SYS_PG_CONFIG=$(command -v pg_config)
            PG_VER=$($SYS_PG_CONFIG --version | awk '{print $2}' | cut -d. -f1)
            if [ "$PG_VER" = "${{ matrix.pg_version }}" ]; then
              PG_CONFIG=$SYS_PG_CONFIG
            fi
          fi

          if [ -z "$PG_CONFIG" ]; then
            PG_CONFIG=$(find ~/.pgrx -name pg_config | grep "/${{ matrix.pg_version }}.*/" | head -n 1)
          fi

          echo "Using pg_config: $PG_CONFIG"
          cargo pgrx package --features pg${{ matrix.pg_version }} -c "$PG_CONFIG"

      - name: Create Tarball
        run: |
          PACKAGE_NAME="spiral"
          TAG_NAME="${{ github.ref_name }}"
          VERSION="${TAG_NAME#v}"
          TARGET_DIR="target/release/${PACKAGE_NAME}-pg${{ matrix.pg_version }}"
          OS=$(echo "${{ runner.os }}" | tr '[:upper:]' '[:lower:]')
          ARCH=$(echo "${{ runner.arch }}" | tr '[:upper:]' '[:lower:]')
          OUTPUT_NAME="${PACKAGE_NAME}-${VERSION}-${OS}-${ARCH}-pg${{ matrix.pg_version }}.tar.gz"
          tar -czf "${OUTPUT_NAME}" -C "${TARGET_DIR}" .
          echo "ASSET_PATH=${OUTPUT_NAME}" >> $GITHUB_ENV

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: assets-${{ runner.os }}-${{ runner.arch }}
          path: ${{ env.ASSET_PATH }}

  release:
    name: Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*.tar.gz
          generate_release_notes: true
          draft: false
          prerelease: false

  homebrew:
    name: Update Homebrew
    if: startsWith(github.ref, 'refs/tags/v')
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Update Homebrew Formula
        run: |
          TAG_NAME="${{ github.ref_name }}"
          VERSION="${TAG_NAME#v}"
          URL="https://github.com/${{ github.repository }}/archive/refs/tags/${TAG_NAME}.tar.gz"

          ./scripts/update-homebrew.sh "${VERSION}" "${URL}"

      - name: Commit formula update
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/spiral.rb
          git commit -m "chore: update homebrew formula to ${{ github.ref_name }}" || echo "No changes to commit"
          git push origin main
