name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libreadline-dev \
            zlib1g-dev \
            flex \
            bison \
            libxml2-dev \
            libxslt-dev \
            libssl-dev \
            libxml2-utils \
            xsltproc \
            ccache \
            pkg-config \
            libclang-dev \
            clang
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - name: Cache cargo-pgrx binary
        id: cache-pgrx-bin
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/cargo-pgrx
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
          key: ${{ runner.os }}-cargo-pgrx-bin-0.17.0
      - name: Install cargo-pgrx
        if: steps.cache-pgrx-bin.outputs.cache-hit != 'true'
        run: cargo install cargo-pgrx --version 0.17.0 --locked
      - name: Cache pgrx PG installation
        uses: actions/cache@v4
        with:
          path: ~/.pgrx
          key: ${{ runner.os }}-pgrx-0.17.0-pg18
      - name: Initialize pgrx
        run: cargo pgrx init --pg18 download
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Run clippy
        run: cargo clippy --all-targets --features pg18 -- -D warnings

  test:
    name: Test (PG ${{ matrix.pg_version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        pg_version: [18]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libreadline-dev \
            zlib1g-dev \
            flex \
            bison \
            libxml2-dev \
            libxslt-dev \
            libssl-dev \
            libxml2-utils \
            xsltproc \
            ccache \
            pkg-config \
            libclang-dev \
            clang

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache cargo-pgrx binary
        id: cache-pgrx-bin
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/cargo-pgrx
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
          key: ${{ runner.os }}-cargo-pgrx-bin-0.17.0

      - name: Install cargo-pgrx
        if: steps.cache-pgrx-bin.outputs.cache-hit != 'true'
        run: cargo install cargo-pgrx --version 0.17.0 --locked

      - name: Cache pgrx PG installation
        uses: actions/cache@v4
        with:
          path: ~/.pgrx
          key: ${{ runner.os }}-pgrx-0.17.0-pg18

      - name: Initialize pgrx
        run: cargo pgrx init --pg18 download

      - name: Run tests
        run: cargo pgrx test pg${{ matrix.pg_version }} --no-default-features --features pg${{ matrix.pg_version }}
